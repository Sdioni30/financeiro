spring:
  profiles:
    active: local

  datasource:

    url: ${DB_URL:jdbc:mysql://localhost:3306/db_financeiro}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  preco: ${MERCADOPAGO_PRECO:9.90}
  return-url: ${MERCADOPAGO_RETURN_URL:https://controlefinanceiro.projetcsdioni.online/}
  webhook-url: ${MERCADOPAGO_WEBHOOK_URL:https://controlefinanceiro.projetcsdioni.online/api/pagamento/webhook}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET}
  sandbox: ${MERCADOPAGO_SANDBOX:false}
  contas-gratuitas: ${MERCADOPAGO_CONTAS_GRATUITAS:sdioni30@gmail.com}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never